name: Build MAT267 TI-84 CE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ── 1. checkout your code ─────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. install CE toolchain (official pre-built release) ──────
    - name: Install CE toolchain
      run: |
        sudo apt-get update -y
        sudo apt-get install -y cmake python3 python3-pip wget
        # Download official pre-built CE toolchain
        wget -q https://github.com/CE-Programming/toolchain/releases/latest/download/CEdev-Linux.tar.gz
        sudo tar xf CEdev-Linux.tar.gz -C /usr/local --strip-components=1
        echo "/usr/local/bin" >> $GITHUB_PATH
        # Verify
        cedev-config --version || echo "cedev installed"

    # ── 3. build the .8xp ─────────────────────────────────────────
    - name: Build mat267ti.8xp
      run: |
        # Find where the toolchain actually installed
        find /usr/local -name "*.cmake" 2>/dev/null | grep -i "ce\|toolchain" | head -20
        TCFILE=$(find /usr/local -name "CEdev.cmake" -o -name "toolchain.cmake" 2>/dev/null | head -1)
        echo "Found toolchain at: $TCFILE"
        mkdir build && cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE="$TCFILE"
        make -j$(nproc)
        find .. -name "*.8xp" 2>/dev/null

    # ── 4. upload as downloadable artifact ───────────────────────
    - name: Upload 8xp
      uses: actions/upload-artifact@v4
      with:
        name: MAT267TI
        path: "**/*.8xp"
        retention-days: 30
